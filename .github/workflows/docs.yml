name: Docs

on:
  push:
    branches: [main]
    paths:
      - README.md
      - docs/**
      - .github/workflows/docs.yml
      - src/**
      - .config/dotnet-tools.json
      - Directory.Build.props
      - Directory.Packages.props
      - global.json
  pull_request:
    branches: [main]
    paths:
      - README.md
      - docs/**
      - .github/workflows/docs.yml
      - src/**
      - .config/dotnet-tools.json
      - Directory.Build.props
      - Directory.Packages.props
      - global.json
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-docfx:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore local tools
        run: dotnet tool restore

      - name: Restore
        run: dotnet restore Cress.sln

      - name: Build
        run: dotnet build Cress.sln --configuration Release --no-restore /p:ContinuousIntegrationBuild=true

      - name: Build DocFX site
        run: dotnet tool run docfx docs\docfx.json --output artifacts\docs-site

      - name: Upload docs preview artifact
        uses: actions/upload-artifact@v7
        with:
          name: docs-site-preview
          path: artifacts\docs-site

      - name: Configure Pages
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v6

      - name: Upload GitHub Pages artifact
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v5
        with:
          path: artifacts\docs-site

  deploy-docfx:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: build-docfx
    runs-on: windows-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
