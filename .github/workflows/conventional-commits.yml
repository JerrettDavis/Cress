name: Conventional Commits

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  pr-title:
    name: PR title
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Validate PR title
        uses: actions/github-script@v9
        with:
          script: |
            const pattern = /^(build|chore|ci|docs|feat|fix|perf|refactor|revert|style|test)(\([^)]+\))?(!)?: .+/;
            const title = context.payload.pull_request.title.trim();

            if (!pattern.test(title)) {
              core.setFailed(
                [
                  `PR title "${title}" is not a Conventional Commit headline.`,
                  'Use the format: type(scope): subject',
                  'Example: feat(studio): add live companion drawer',
                ].join('\n'),
              );
            }

  pr-commits:
    name: PR commits
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Validate pull request commits
        uses: actions/github-script@v9
        with:
          script: |
            const pattern = /^(build|chore|ci|docs|feat|fix|perf|refactor|revert|style|test)(\([^)]+\))?(!)?: .+/;
            const commits = await github.paginate(
              github.rest.pulls.listCommits,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                per_page: 100,
              },
            );

            const invalid = commits
              .map(({ sha, commit }) => ({
                sha: sha.slice(0, 7),
                headline: commit.message.split('\n')[0].trim(),
              }))
              .filter(({ headline }) => !pattern.test(headline));

            if (invalid.length > 0) {
              core.setFailed(
                [
                  'Every commit in the pull request must use a Conventional Commit headline.',
                  'Use the format: type(scope): subject',
                  '',
                  ...invalid.map(({ sha, headline }) => `- ${sha}: ${headline}`),
                ].join('\n'),
              );
            }

  push-commits:
    name: Push commits
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Validate pushed commits
        uses: actions/github-script@v9
        with:
          script: |
            const pattern = /^(build|chore|ci|docs|feat|fix|perf|refactor|revert|style|test)(\([^)]+\))?(!)?: .+/;
            const mergePattern = /^Merge (pull request|branch) /;
            const payloadCommits = (context.payload.commits ?? []).map(({ id, message }) => ({
              sha: id.slice(0, 7),
              headline: message.split('\n')[0].trim(),
            }));

            let commits = payloadCommits;
            const before = context.payload.before;
            const after = context.payload.after;

            if (before && after && !/^0+$/.test(before)) {
              const comparison = await github.rest.repos.compareCommitsWithBasehead({
                owner: context.repo.owner,
                repo: context.repo.repo,
                basehead: `${before}...${after}`,
              });

              commits = comparison.data.commits.map(({ sha, commit }) => ({
                sha: sha.slice(0, 7),
                headline: commit.message.split('\n')[0].trim(),
              }));
            }

            const invalid = commits.filter(
              ({ headline }) => !pattern.test(headline) && !mergePattern.test(headline),
            );

            if (invalid.length > 0) {
              core.setFailed(
                [
                  'Every authored commit pushed to main must use a Conventional Commit headline.',
                  'Use the format: type(scope): subject',
                  'Git-generated merge commits are ignored because PR title and PR commit checks already validate authored changes.',
                  '',
                  ...invalid.map(({ sha, headline }) => `- ${sha}: ${headline}`),
                ].join('\n'),
              );
            }
