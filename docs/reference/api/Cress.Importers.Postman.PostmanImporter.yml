  summary: Parse a Postman Collection v2.1 JSON string and return one <xref href="Cress.Core.Models.CressFlow" data-throw-if-not-resolved="false"></xref> per request.
  example: []
  syntax:
    content: public IReadOnlyList<CressFlow> Import(string collectionJson, bool singleFlow = false)
    parameters:
    - id: collectionJson
      type: System.String
      description: Full JSON content of the Postman collection.
    - id: singleFlow
      type: System.Boolean
      description: >-
        When <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">true</a>, all requests are combined into one flow with sequential steps.

        When <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">false</a> (default), one flow is produced per request.
    return:
      type: System.Collections.Generic.IReadOnlyList{Cress.Core.Models.CressFlow}
      description: A list of <xref href="Cress.Core.Models.CressFlow" data-throw-if-not-resolved="false"></xref> objects ready for YAML serialization.
