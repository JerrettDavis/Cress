  summary: >-
    Exports a <xref href="Cress.Core.Models.CressFlow" data-throw-if-not-resolved="false"></xref> as a Cypress <code>.cy.ts</code> test file.

    This is a lossy one-way conversion — some locator strategies require Cypress

    Testing Library plugins (findByRole, findByLabelText, findByTestId).
  remarks: >-
    <p><b>Plugin requirements:</b></p>

    <ul><li><span class="term">testId / role / label</span>Requires @testing-library/cypress</li><li><span class="term">xpath</span>Requires cypress-xpath</li></ul>

    <p>Locator priority for <code>ui.click</code> and <code>ui.fill</code>:</p>

    <ol><li>testId</li><li>role + label</li><li>label (alone)</li><li>text</li><li>cssSelector</li><li>xpath</li><li>automationId (mapped to [id="..."] with comment)</li></ol>
