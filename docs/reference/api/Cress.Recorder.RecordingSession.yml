  assemblies:
  - Cress.Recorder
  namespace: Cress.Recorder
  summary: >-
    Attaches to a running process and records UIA events until <xref href="Cress.Recorder.RecordingSession.Stop" data-throw-if-not-resolved="false"></xref> is called.

    Thread-safe: event handlers fire on the UIA COM background thread; all state is

    protected by <xref href="System.Collections.Concurrent.ConcurrentQueue%601" data-throw-if-not-resolved="false"></xref> and <xref href="System.Threading.Interlocked" data-throw-if-not-resolved="false"></xref>.
