  assemblies:
  - Cress.Recorder
  namespace: Cress.Recorder.Inference
  summary: >-
    Pure, stateless inference engine that converts a sequence of <xref href="Cress.Recorder.RecordedEvent" data-throw-if-not-resolved="false"></xref>

    objects into <xref href="Cress.Recorder.Inference.InferredStep" data-throw-if-not-resolved="false"></xref> objects using deterministic rules.


    Design notes:

    - No desktop-driver dependency — safe to unit-test without launching any real application.

    - No mutation of input events.

    - Thread-safe: all methods are pure transformations on value types.

    - Single engine for both Desktop and Web domains — branching is via
      <xref href="Cress.Recorder.Inference.InferenceOptions.Domain" data-throw-if-not-resolved="false"></xref>. Desktop path is unchanged from R1-R6.
