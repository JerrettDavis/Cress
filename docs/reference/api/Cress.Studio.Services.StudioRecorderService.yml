  assemblies:
  - Cress.Studio.Core
  namespace: Cress.Studio.Services
  summary: >-
    Wraps <xref href="Cress.Recorder.RecordingSession" data-throw-if-not-resolved="false"></xref> (desktop) and <xref href="Cress.Studio.Services.WebRecorderClient" data-throw-if-not-resolved="false"></xref> (web)

    and exposes recording state for the Blazor Studio.

    Registered as <code>Scoped</code> — one instance per Blazor circuit (one per browser tab).

    Thread-safe: UIA events fire on COM background threads; all state writes are guarded by

    <xref href="System.Threading.Interlocked" data-throw-if-not-resolved="false"></xref> / volatile / <xref href="System.Threading.Lock" data-throw-if-not-resolved="false"></xref>.
