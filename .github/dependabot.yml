# Keep dependency PRs grouped and delayed for at least 48 hours so newly published packages age before adoption.
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/Chicago"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "chore(deps)"
    cooldown:
      default-days: 2
    groups:
      github-actions-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/Chicago"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps)"
    cooldown:
      default-days: 2
    groups:
      nuget-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directories:
      - "/"
      - "/node/cress-driver-playwright"
      - "/node/cress-plugin-host-node"
      - "/node/cress-sdk"
      - "/node/cress-web-recorder"
      - "/node/tests/fixtures/sample-plugin"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/Chicago"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps)"
    cooldown:
      default-days: 2
    groups:
      npm-dependencies:
        patterns:
          - "*"
