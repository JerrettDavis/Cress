version: 1
project:
  name: Studio Sample Project
  defaultProfile: local
paths:
  capabilities: capabilities
  flows: flows
  models: models
  fixtures: fixtures
  steps: steps
  artifacts: artifacts/runs
  reports: reports
defaults:
  timeout: 30000
  retries: 0
  evidence: full
  cleanup: on-success
plugins:
  discover:
    - plugins
    - steps
drivers:
  http:
    enabled: false
  playwright:
    enabled: false
  flaui:
    enabled: true
