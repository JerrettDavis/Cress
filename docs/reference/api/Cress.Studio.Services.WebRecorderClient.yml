  type: Method
  source:
    remote:
      path: src/Cress.Studio.Core/Services/WebRecorderClient.cs
      branch: main
      repo: https://github.com/JerrettDavis/Cress.git
    id: ParseJsonLine
    path: ../src/Cress.Studio.Core/Services/WebRecorderClient.cs
    startLine: 214
  assemblies:
  - Cress.Studio.Core
  namespace: Cress.Studio.Services
  summary: >-
    Parses a single JSON line from the Node recorder into a <xref href="Cress.Recorder.RecordedEvent" data-throw-if-not-resolved="false"></xref>.

    The Node shape is:

    <pre><code class="lang-csharp">{ "kind": "click", "timestamp": "...", "element": { "testId": "...", "role": "...", ... }, "value": null, "key": null, "url": null }</code></pre>

    Exposed as <code>public</code> so that unit tests can exercise the parser directly

    without spawning a Node process.
  example: []
  syntax:
    content: public static RecordedEvent? ParseJsonLine(string line)
    parameters:
    - id: line
      type: System.String
    return:
      type: Cress.Recorder.RecordedEvent
    content.vb: Public Shared Function ParseJsonLine(line As String) As RecordedEvent
  overload: Cress.Studio.Services.WebRecorderClient.ParseJsonLine*
  nameWithType.vb: WebRecorderClient.ParseJsonLine(String)
  fullName.vb: Cress.Studio.Services.WebRecorderClient.ParseJsonLine(String)
  name.vb: ParseJsonLine(String)
