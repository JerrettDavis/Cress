name: Feature Request
description: Suggest an enhancement for Cress or its developer workflow
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. Please describe the problem and the outcome you want.

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What limitation or friction are you trying to solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the capability, workflow, or behavior you want added.
    validations:
      required: true

  - type: textarea
    id: scenarios
    attributes:
      label: Example scenarios
      description: Concrete usage examples, flow snippets, or CI/developer workflows that would benefit.
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds or other approaches you have considered.
    validations:
      required: false
