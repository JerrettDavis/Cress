  type: Property
  source:
    remote:
      path: src/Cress.Recorder/Inference/InferenceOptions.cs
      branch: main
      repo: https://github.com/JerrettDavis/Cress.git
    id: AssertionTargetAutomationId
    path: ../src/Cress.Recorder/Inference/InferenceOptions.cs
    startLine: 69
  assemblies:
  - Cress.Recorder
  namespace: Cress.Recorder.Inference
  summary: >-
    When set, <xref href="Cress.Recorder.EventKind.ValueChanged" data-throw-if-not-resolved="false"></xref> events (and PropertyChanged events

    carrying a new value) on the element whose AutomationId matches this string are

    emitted as <xref href="Cress.Recorder.Inference.StepKind.AssertText" data-throw-if-not-resolved="false"></xref> steps rather than <xref href="Cress.Recorder.Inference.StepKind.SetValue" data-throw-if-not-resolved="false"></xref> steps.

    For Calculator this is <code>"CalculatorResults"</code>.

    Only applies when <xref href="Cress.Recorder.Inference.InferenceOptions.Domain" data-throw-if-not-resolved="false"></xref> is <xref href="Cress.Recorder.Inference.InferenceDomain.Desktop" data-throw-if-not-resolved="false"></xref>.
  example: []
  syntax:
    content: public string? AssertionTargetAutomationId { get; init; }
    parameters: []
    return:
      type: System.String
    content.vb: Public Property AssertionTargetAutomationId As String
  overload: Cress.Recorder.Inference.InferenceOptions.AssertionTargetAutomationId*
