version: 1
project:
  name: httpbin-smoke
  defaultProfile: ci

paths:
  capabilities: capabilities
  flows: flows
  models: models
  fixtures: fixtures
  steps: steps
  artifacts: artifacts/runs
  reports: reports

defaults:
  timeout: 30000
  retries: 0
  evidence: standard
  cleanup: on-success

plugins:
  discover: []

drivers:
  http:
    enabled: true
  playwright:
    enabled: false
  flawright:
    enabled: false
