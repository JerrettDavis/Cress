- uid: Cress.Recorder.Inference.InferenceOptions.DebounceWindow
  commentId: P:Cress.Recorder.Inference.InferenceOptions.DebounceWindow
  id: DebounceWindow
  parent: Cress.Recorder.Inference.InferenceOptions
  langs:
  - csharp
  - vb
  name: DebounceWindow
  nameWithType: InferenceOptions.DebounceWindow
  fullName: Cress.Recorder.Inference.InferenceOptions.DebounceWindow
  type: Property
  source:
    remote:
      path: src/Cress.Recorder/Inference/InferenceOptions.cs
      branch: main
      repo: https://github.com/JerrettDavis/Cress.git
    id: DebounceWindow
    path: ../src/Cress.Recorder/Inference/InferenceOptions.cs
    startLine: 45
  assemblies:
  - Cress.Recorder
  namespace: Cress.Recorder.Inference
  summary: >-
    Identical consecutive events within this window are collapsed to a single event.

    Identity is defined as: same <xref href="Cress.Recorder.EventKind" data-throw-if-not-resolved="false"></xref> + same element RuntimeId +

    same <xref href="Cress.Recorder.RecordedEvent.Value" data-throw-if-not-resolved="false"></xref> / <xref href="Cress.Recorder.RecordedEvent.Key" data-throw-if-not-resolved="false"></xref>.

    Defaults to 50 ms (conservative; avoids double-event noise without hiding real repeated clicks).
  example: []
  syntax:
    content: public TimeSpan DebounceWindow { get; init; }
    parameters: []
    return:
      type: System.TimeSpan
    content.vb: Public Property DebounceWindow As TimeSpan
  overload: Cress.Recorder.Inference.InferenceOptions.DebounceWindow*
- uid: Cress.Recorder.Inference.InferenceOptions.WebDebounceWindow
  commentId: P:Cress.Recorder.Inference.InferenceOptions.WebDebounceWindow
  id: WebDebounceWindow
  parent: Cress.Recorder.Inference.InferenceOptions
  langs:
  - csharp
  - vb
  name: WebDebounceWindow
  nameWithType: InferenceOptions.WebDebounceWindow
  fullName: Cress.Recorder.Inference.InferenceOptions.WebDebounceWindow
  type: Property
  source:
    remote:
      path: src/Cress.Recorder/Inference/InferenceOptions.cs
      branch: main
      repo: https://github.com/JerrettDavis/Cress.git
    id: WebDebounceWindow
    path: ../src/Cress.Recorder/Inference/InferenceOptions.cs
    startLine: 54
  assemblies:
  - Cress.Recorder
  namespace: Cress.Recorder.Inference
  summary: >-
    Debounce window applied to consecutive <xref href="Cress.Recorder.EventKind.ValueChanged" data-throw-if-not-resolved="false"></xref> events

    on the same element when <xref href="Cress.Recorder.Inference.InferenceOptions.Domain" data-throw-if-not-resolved="false"></xref> is <xref href="Cress.Recorder.Inference.InferenceDomain.Web" data-throw-if-not-resolved="false"></xref>.

    Human typing has natural inter-key pauses longer than the desktop debounce window,

    so a longer window (250 ms default) collapses a "hello" keystroke stream into one fill.

    The last value in the window is kept (not the first, unlike the standard debounce).
  example: []
  syntax:
    content: public TimeSpan WebDebounceWindow { get; init; }
    parameters: []
    return:
      type: System.TimeSpan
    content.vb: Public Property WebDebounceWindow As TimeSpan
  overload: Cress.Recorder.Inference.InferenceOptions.WebDebounceWindow*
