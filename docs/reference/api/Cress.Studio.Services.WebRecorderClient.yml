    path: ../src/Cress.Studio.Core/Services/WebRecorderClient.cs
    startLine: 15
  assemblies:
  - Cress.Studio.Core
  namespace: Cress.Studio.Services
  summary: >-
    Spawns the Node.js web recorder (<code>node bin/record.mjs --stream</code>) as a child process

    and translates its JSON stdout stream into <xref href="Cress.Recorder.RecordedEvent" data-throw-if-not-resolved="false"></xref> objects.


    Approach: direct child process (option a) — Studio spawns Node and reads JSONL from stdout.

    One JSON line is emitted per event.  The C# side parses each line and raises

    <xref href="Cress.Studio.Services.WebRecorderClient.EventCaptured" data-throw-if-not-resolved="false"></xref>.  <xref href="Cress.Studio.Services.WebRecorderClient.StopAsync" data-throw-if-not-resolved="false"></xref> sends SIGINT (Process.Kill on Windows)

    and waits for the process to exit.
  example: []
  syntax:
    content: 'public sealed class WebRecorderClient : IDisposable'
    content.vb: Public NotInheritable Class WebRecorderClient Implements IDisposable
