name: Docs

on:
  push:
    branches: [main]
    paths:
      - README.md
      - docs/**
      - .github/workflows/docs.yml
      - src/Cress.LivingDocs/**
      - src/Cress.Cli/**
      - specs/**
  pull_request:
    branches: [main]
    paths:
      - README.md
      - docs/**
      - .github/workflows/docs.yml
      - src/Cress.LivingDocs/**
      - src/Cress.Cli/**
      - specs/**
  workflow_dispatch:

permissions:
  contents: read

jobs:
  living-doc-preview:
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore Cress.sln

      - name: Build
        run: dotnet build Cress.sln --configuration Release --no-restore /p:ContinuousIntegrationBuild=true

      - name: Generate living docs preview
        run: >
          dotnet run --project src\Cress.Cli\Cress.Cli.csproj
          --configuration Release
          --no-build
          --
          doc generate specs\httpbin-smoke
          --output artifacts\docs\httpbin-smoke.html
          --template executive

      - name: Upload docs preview
        uses: actions/upload-artifact@v4
        with:
          name: docs-preview
          path: artifacts\docs
