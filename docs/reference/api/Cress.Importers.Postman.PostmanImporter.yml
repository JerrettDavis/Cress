  assemblies:
  - Cress.Importers
  namespace: Cress.Importers.Postman
  summary: >-
    Converts a Postman Collection v2.1 JSON file into one or more <xref href="Cress.Core.Models.CressFlow" data-throw-if-not-resolved="false"></xref> objects.

    Each request becomes a separate flow by default (<code class="paramref">singleFlow</code> = false),

    or all requests are combined into a single multi-step flow when <code class="paramref">singleFlow</code> = true.
  remarks: >-
    Supports:

    <ul><li>HTTP methods: GET, POST, PUT, DELETE, PATCH, HEAD, OPTIONS</li><li>URL from <code>request.url.raw</code> (preferred) or reconstructed from host/path</li><li>Headers → <code>with.headers.*</code> key/value pairs</li><li>Raw body → <code>with.body</code></li><li>Postman variable syntax <code>{{varName}}</code> is preserved verbatim</li><li>Folder hierarchy → flow <code>tags</code></li></ul>

    Does NOT support:

    <ul><li>Pre-request scripts or test scripts (Postman JS hooks) — emitted as TODO comment steps</li><li>Body modes other than "raw" — emitted as TODO comment steps</li></ul>
  example: []
